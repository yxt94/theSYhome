<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP Responses — Host View</title>
<style>
  body { font-family: -apple-system, Arial, sans-serif; background:#f5f2ea; margin:0; padding:24px; }
  .wrap { max-width:700px; margin:0 auto; }
  h1 { font-size:20px; }
  #keyRow { display:flex; gap:8px; margin-bottom:20px; }
  input { flex:1; padding:8px; border:1px solid #ccc; border-radius:6px; }
  button { padding:8px 16px; border:1px solid #333; background:#333; color:#fff; border-radius:6px; cursor:pointer; }
  .summary { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
  .card { background:#fff; border-radius:8px; padding:14px; text-align:center; }
  .card .num { font-size:22px; font-weight:600; }
  .card .label { font-size:12px; color:#777; }
  table { width:100%; border-collapse:collapse; background:#fff; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid #eee; font-size:13px; }
  th { color:#777; font-weight:500; }
  #err { color:#a32d2d; font-size:13px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>RSVP responses</h1>
  <div id="keyRow">
    <input id="keyInput" type="password" placeholder="Host key">
    <button id="loadBtn">Load</button>
  </div>
  <div id="err"></div>
  <div id="summary" class="summary"></div>
  <table id="tbl" style="display:none;">
    <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Attending</th><th>Guests</th><th>Message</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
  // ===== EDIT THIS AFTER DEPLOYING THE APPS SCRIPT =====
   var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxwn-XyfVN7ckJEV4njqJ4N-SSSgR_8E6NB6BO9eRsVSImxkyl2Z1CGt7-jVYnCHDmRKQ/exec';
  // =======================================================

  document.getElementById('loadBtn').addEventListener('click', function(){
    var key = document.getElementById('keyInput').value.trim();
    var err = document.getElementById('err');
    err.textContent = '';
    fetch(SCRIPT_URL + '?key=' + encodeURIComponent(key))
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (data.status !== 'ok') {
          err.textContent = data.message || 'Unauthorized';
          return;
        }
        renderResponses(data.responses);
      })
      .catch(function(){ err.textContent = 'Could not reach the server.'; });
  });

  function renderResponses(rows) {
    var yes = rows.filter(function(r){ return r.Attending === 'Yes'; });
    var no = rows.filter(function(r){ return r.Attending === 'No'; });
    var maybe = rows.filter(function(r){ return r.Attending === 'Maybe'; });
    var totalGuests = yes.reduce(function(s,r){ return s + (parseInt(r.Guests) || 1); }, 0);

    document.getElementById('summary').innerHTML =
      '<div class="card"><div class="num">' + yes.length + ' (' + totalGuests + ')</div><div class="label">Attending (guests)</div></div>' +
      '<div class="card"><div class="num">' + no.length + '</div><div class="label">Not attending</div></div>' +
      '<div class="card"><div class="num">' + maybe.length + '</div><div class="label">Maybe</div></div>';

    var tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    rows.slice().reverse().forEach(function(r){
      var tr = document.createElement('tr');
      tr.innerHTML = '<td>' + escapeHtml(r.Name) + '</td>' +
        '<td>' + escapeHtml(r.Email) + '</td>' +
        '<td>' + escapeHtml(r.Phone) + '</td>' +
        '<td>' + escapeHtml(r.Attending) + '</td>' +
        '<td>' + escapeHtml(String(r.Guests || '')) + '</td>' +
        '<td>' + escapeHtml(r.Message) + '</td>';
      tbody.appendChild(tr);
    });
    document.getElementById('tbl').style.display = rows.length ? 'table' : 'none';
  }

  function escapeHtml(s) {
    return (s || '').toString().replace(/[&<>"']/g, function(c){
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }
</script>
</body>
</html>
